[project]
name = "universal-size-crawler"
version = "0.1.0"
description = "Universal size chart crawler — DOM, API sniffing, image VLLM"
requires-python = ">=3.12"
dependencies = [
    "playwright>=1.44.0",
    "beautifulsoup4>=4.12.0",
    "opencv-python-headless>=4.9.0",
    "pillow>=10.3.0",
    "anthropic>=0.28.0",
    "httpx>=0.27.0",
    "lxml>=5.2.0",
    "python-dotenv>=1.0.0",
    "size-crawler",
]

[tool.uv.sources]
size-crawler = { workspace = true }

[project.scripts]
universal-size-crawler = "universal_size_crawler.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/universal_size_crawler"]
