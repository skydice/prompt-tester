[project]
name = "size-crawler"
version = "0.1.0"
description = "Korean fashion retailer size chart crawler (무신사, 유니클로)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/size_crawler"]
